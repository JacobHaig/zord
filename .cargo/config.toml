# ScreenCaptureKit's Swift bridge requires a macOS 13 deployment target.
# Targeting 13.0 (our minimum — runs on all Apple Silicon).
[env]
MACOSX_DEPLOYMENT_TARGET = "13.0"
# Force llama-cpp-sys-2 to build ggml/llama against the STATIC MSVC CRT (/MT) so
# it matches Rust's +crt-static, whisper, and sherpa on Windows. Without this its
# build.rs defaults to /MD (dynamic), making llama the lone dynamic-CRT component
# → cross-heap free → instant silent crash on summarize/compress. MSVC-only knob;
# a no-op on macOS/Linux toolchains (kept here so local Windows builds match CI).
LLAMA_STATIC_CRT = "1"

# The transitive Swift bridges (apple-metal / apple-cf) FORCE_LOAD the Swift
# back-compat static libs, but the linker only searches the full-Xcode path.
# Add the Command Line Tools Swift lib dir so they resolve on a CLT-only setup.
# NOTE: Phase 6 (packaging) will detect this path instead of hardcoding it.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-L/Library/Developer/CommandLineTools/usr/lib/swift/macosx"]

# Windows: sherpa-onnx's prebuilt libs (diarization/parakeet) link the STATIC
# MSVC CRT (/MT). Rust + the cmake-built C++ deps (llama.cpp for summaries,
# whisper.cpp) default to the DYNAMIC CRT (/MD), which collides at link time
# (LNK2038/LNK2005). Force the whole binary onto the static CRT so they match.
# Paired with CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded (set in CI) so the cmake
# deps build static too.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
