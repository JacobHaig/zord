name: Release

# Build the macOS + Windows apps (GUI bundle + `zord` CLI) on a version tag,
# optionally sign/notarize macOS, then attach everything to a GitHub Release.
#
# Distribution channels (Phase 34/35): a tag push builds the default `github`
# channel (self-updating). Store builds — which must NOT self-update, the
# store does that — are produced by dispatching this workflow manually with
# channel=steam|msstore; their artifacts get the channel in the name and are
# uploaded as workflow artifacts for manual store submission.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Distribution channel baked into the build"
        type: choice
        default: github
        options: [github, steam, msstore]

permissions:
  contents: write

env:
  # Bridge for third-party actions still pinned to Node 20 (GitHub kills Node 20
  # runtime June 16 2026). Remove once those actions ship Node 24 releases.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Optional engines bundled into the released GUI app. encryption is now
  # included; it requires vendored OpenSSL (macOS: fine with existing toolchain;
  # Windows: Strawberry Perl ships on windows-latest, NASM installed explicitly).
  # The channel step appends self-update for github builds. `semantic`
  # (ort/onnxruntime) now ships on ALL platforms: Phase 51 switched ort to
  # `load-dynamic`, so the /MT static-CRT exe links clean and we ship the
  # matching `onnxruntime.dll`/`libonnxruntime.dylib` beside the binary (see the
  # per-OS "Bundle ONNX Runtime" steps). No more Windows-only caveat.
  FEATURES: "diarization,voiceprints,llm-local,llm-remote,parakeet,discord,encryption,semantic"
  # The CLI (zord-app) only declares a subset — voiceprints/discord/self-update
  # are GUI/integration features it doesn't have; passing them fails the build.
  CLI_FEATURES: "diarization,llm-local,llm-remote,parakeet,encryption"
  CHANNEL: ${{ inputs.channel || 'github' }}

jobs:
  macos:
    name: macOS (Apple Silicon)
    # macos-15 ships Xcode 26 (macOS 26 SDK), which the screencapturekit Swift
    # bridge (apple-metal) requires to compile. macos-14 tops out at Xcode 16.
    runs-on: macos-15
    env:
      # macOS 13 deployment target for the ScreenCaptureKit Swift bridge.
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      # True only when signing secrets are configured; gates the sign/notarize steps.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_SIGNING_IDENTITY != '' }}
    steps:
      - uses: actions/checkout@v5

      # The screencapturekit Swift bridge (apple-metal/apple-cf) runs `swift
      # build` at compile time; pin a recent stable Xcode so its toolchain
      # matches what builds locally (Swift 6.x) rather than the runner default.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: brew install cmake

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked

      # Bake the channel into the binary (zord-core reads ZORD_CHANNEL at
      # compile time); only the github channel gets the self-update feature.
      - name: Resolve channel
        run: |
          F="${{ env.FEATURES }}"
          if [ "${{ env.CHANNEL }}" = "github" ]; then F="$F,self-update"; fi
          echo "FEATURES=$F" >> "$GITHUB_ENV"
          echo "ZORD_CHANNEL=${{ env.CHANNEL }}" >> "$GITHUB_ENV"

      - name: Bundle app
        run: dx bundle --release --package zord-gui --platform desktop --features "${{ env.FEATURES }}"

      - name: Build CLI
        run: cargo build --release --package zord-app --features "${{ env.CLI_FEATURES }}"

      # Bundle ONNX Runtime 1.24.2 (Phase 51b). ort runs `load-dynamic`, so the
      # app loads `libonnxruntime.dylib` from beside the exe at runtime — we must
      # ship it. Place it inside the .app (next to zord-gui) AND beside the CLI.
      # ort 2.0.0-rc.12 targets onnxruntime 1.24.2 (API 24); ship exactly that.
      # The tgz contains the REAL file `libonnxruntime.1.24.2.dylib` plus a
      # `libonnxruntime.dylib` SYMLINK — copy the real file and name the dest
      # `libonnxruntime.dylib` (never ship the symlink; it'd dangle in the zip).
      - name: Bundle ONNX Runtime (libonnxruntime.dylib)
        run: |
          set -euo pipefail
          URL="https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-osx-arm64-1.24.2.tgz"
          curl -fsSL "$URL" -o ort.tgz
          mkdir -p ort-extract
          tar -xzf ort.tgz -C ort-extract
          # Find the real dylib (not the symlink).
          REAL=$(find ort-extract -name "libonnxruntime*.dylib" ! -type l | head -1)
          if [ -z "$REAL" ]; then echo "::error::real libonnxruntime dylib not found"; exit 1; fi
          echo "Found ORT dylib: $REAL"
          APP=$(find target -path "*bundle*" -name "*.app" -maxdepth 8 -type d | head -1)
          if [ -z "$APP" ]; then echo "::error::GUI .app not found"; exit 1; fi
          cp "$REAL" "$APP/Contents/MacOS/libonnxruntime.dylib"
          cp "$REAL" target/release/libonnxruntime.dylib
          ls -l "$APP/Contents/MacOS/libonnxruntime.dylib" target/release/libonnxruntime.dylib

      # ---- Optional: code-sign + notarize (only if secrets are set) ----
      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
          rm cert.p12

      - name: Sign, notarize & staple
        if: env.HAS_SIGNING == 'true'
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP=$(find target -path "*bundle*" -name "*.app" -maxdepth 8 -type d | head -1)
          echo "Signing $APP"
          # Sign the nested ONNX Runtime dylib FIRST (Phase 51b). `--deep` alone
          # can miss a hand-placed dylib, leaving it unsigned → notarization
          # rejects the app. Sign it explicitly with the hardened runtime, then
          # the --deep app sign seals everything.
          codesign --force --options runtime --sign "$SIGNING_IDENTITY" \
            "$APP/Contents/MacOS/libonnxruntime.dylib"
          codesign --deep --force --options runtime \
            --entitlements crates/zord-gui/entitlements.plist \
            --sign "$SIGNING_IDENTITY" "$APP"
          # Notarize via a zip, then staple the ticket onto the .app.
          ditto -c -k --keepParent "$APP" Zord.zip
          xcrun notarytool submit Zord.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$APP"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # Unified naming: Zord-<ver>-<os>-<arch>[-<kind>].<ext> (tag → version,
          # otherwise "dev"). Four macOS artifacts mirroring Windows: installer
          # (.dmg), portable GUI (.app zipped), CLI, and a GUI+CLI zip.
          VER="${GITHUB_REF_NAME#v}"; [ "$GITHUB_REF_TYPE" = "tag" ] || VER="dev"
          # Store-channel artifacts carry the channel in the name.
          [ "${{ env.CHANNEL }}" = "github" ] || VER="$VER-${{ env.CHANNEL }}"
          # GUI installer (dx-produced .dmg). NOTE (Phase 51b): the .dmg is built
          # FROM the .app DURING `dx bundle`, before the ONNX Runtime step patches
          # the .app — so this .dmg does NOT carry libonnxruntime.dylib (semantic
          # search won't work from a .dmg install). The notarized portable .app
          # zip below DOES carry it. Fixing the .dmg needs the dylib injected
          # before `dx bundle` (no dx hook places files in Contents/MacOS) or the
          # .dmg rebuilt from the patched .app — deferred (see report / 51d).
          DMG=$(find target -name "*.dmg" -maxdepth 6 | head -1)
          if [ -n "$DMG" ]; then cp "$DMG" "dist/Zord-$VER-macos-arm64.dmg"; fi
          # Portable GUI: the .app, zipped (a bundle can't be a single file).
          APP=$(find target -path "*bundle*" -name "*.app" -maxdepth 8 -type d | head -1)
          if [ -n "$APP" ]; then ditto -c -k --keepParent "$APP" "dist/Zord-$VER-macos-arm64-gui.zip"; fi
          # CLI binary.
          if [ -f target/release/zord ]; then cp target/release/zord "dist/zord-$VER-macos-arm64-cli"; fi
          # Combined portable zip: the GUI .app + the CLI together (mirrors the
          # Windows GUI+CLI zip). Staged under a named folder so it extracts cleanly.
          if [ -n "$APP" ] && [ -f target/release/zord ]; then
            STAGE="Zord-$VER-macos-arm64"
            rm -rf "$STAGE"; mkdir -p "$STAGE"
            cp -R "$APP" "$STAGE/"
            cp target/release/zord "$STAGE/zord"
            # ONNX Runtime beside the CLI so `zord` finds it (Phase 51b); the
            # .app already carries its own copy via the bundle.
            if [ -f target/release/libonnxruntime.dylib ]; then
              cp target/release/libonnxruntime.dylib "$STAGE/libonnxruntime.dylib"
            fi
            ditto -c -k --keepParent "$STAGE" "dist/Zord-$VER-macos-arm64.zip"
            rm -rf "$STAGE"
          fi
          ls -la dist

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v5
        with:
          name: zord-macos-arm64
          path: dist/*

  windows:
    name: Windows (x64)
    runs-on: windows-latest # has MSVC, CMake, and WebView2 preinstalled
    env:
      # Build the cmake C++ deps (llama.cpp, whisper.cpp) against the STATIC MSVC
      # runtime so they match sherpa-onnx's prebuilt /MT libs and Rust's
      # crt-static (set in .cargo/config.toml). Avoids LNK2038/LNK2005.
      CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
      CMAKE_POLICY_DEFAULT_CMP0091: NEW # honor CMAKE_MSVC_RUNTIME_LIBRARY
      # CRITICAL: llama-cpp-sys-2's build.rs calls config.static_crt(false) UNLESS
      # LLAMA_STATIC_CRT=1, which forces ggml/llama onto the DYNAMIC CRT (/MD) and
      # silently overrides CMAKE_MSVC_RUNTIME_LIBRARY above. That makes llama the
      # lone /MD component while Rust/whisper/sherpa are /MT — at inference a buffer
      # freed across the two CRT heaps corrupts the heap and the process vanishes
      # instantly (every Summarize/Compress, no panic, no log). Force it static too.
      LLAMA_STATIC_CRT: "1"
      # True only when Windows signing secrets are configured; gates the Authenticode step.
      HAS_WIN_SIGNING: ${{ secrets.WINDOWS_CERT_PFX != '' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # The encryption feature vendors OpenSSL, which requires NASM on Windows
      # (Strawberry Perl is already present on windows-latest runners).
      - name: Install NASM (for vendored OpenSSL / encryption feature)
        run: choco install nasm -y

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked

      # Bake the channel into the binary (zord-core reads ZORD_CHANNEL at
      # compile time); only the github channel gets the self-update feature.
      - name: Resolve channel
        shell: bash
        run: |
          F="${{ env.FEATURES }}"
          if [ "${{ env.CHANNEL }}" = "github" ]; then F="$F,self-update"; fi
          # `semantic` (ort/onnxruntime) now ships on Windows too (Phase 51b).
          # Phase 51 switched ort to `load-dynamic`, which emits no static-link
          # directives, so the /MT static-CRT exe links clean — the old LNK2019
          # CRT-symbol wall is gone. We ship the matching `onnxruntime.dll`
          # beside the exe (see "Bundle ONNX Runtime" below). No strip needed.
          echo "FEATURES=$F" >> "$GITHUB_ENV"
          echo "ZORD_CHANNEL=${{ env.CHANNEL }}" >> "$GITHUB_ENV"

      # Stage ONNX Runtime 1.24.2 + VC++ redist BEFORE `dx bundle` (Phase 51b).
      # CRITICAL ORDERING: `dx bundle` builds the NSIS installer DURING the same
      # invocation, and the installer only stages the main exe plus resources
      # declared in Dioxus.toml (`[bundle] resources`). Those resource paths
      # point at `crates/zord-gui/ort-bundle/*.dll`, so the DLLs MUST exist here,
      # before Bundle app, to be packed into the installer beside zord-gui.exe.
      # ort 2.0.0-rc.12 targets onnxruntime 1.24.2 (API 24) — ship exactly that.
      # The VC++ runtime DLLs: onnxruntime.dll is built /MD and needs them; they
      # exist on modern Win10/11 but we bundle them for safety. The right x64
      # copies live in C:\Windows\System32 on the x64 runner.
      - name: Bundle ONNX Runtime + VC++ redist (onnxruntime.dll)
        shell: bash
        run: |
          set -euo pipefail
          DEST="crates/zord-gui/ort-bundle"
          mkdir -p "$DEST"
          URL="https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-win-x64-1.24.2.zip"
          curl -fsSL "$URL" -o ort.zip
          powershell -NoProfile -Command "Expand-Archive -Force -Path ort.zip -DestinationPath ort-extract"
          DLL=$(find ort-extract -name "onnxruntime.dll" | head -1)
          if [ -z "$DLL" ]; then echo "::error::onnxruntime.dll not found in archive"; exit 1; fi
          cp "$DLL" "$DEST/onnxruntime.dll"
          echo "Staged onnxruntime.dll from $DLL"
          # VC++ runtime DLLs from System32 (already the x64 arch on this runner).
          # Copy whatever is present; flag any missing rather than failing — the
          # app still runs on hosts that already have the redist installed.
          for d in vcruntime140.dll vcruntime140_1.dll msvcp140.dll msvcp140_1.dll; do
            SRC="/c/Windows/System32/$d"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$DEST/$d"
              echo "Staged VC++ redist: $d"
            else
              echo "::warning::VC++ redist DLL not found, skipping: $d"
            fi
          done
          ls -l "$DEST"

      - name: Bundle app (WASAPI loopback + cpal mic, CPU whisper)
        run: dx bundle --release --package zord-gui --platform desktop --features "${{ env.FEATURES }}"

      - name: Build CLI
        run: cargo build --release --package zord-app --features "${{ env.CLI_FEATURES }}"

      # Place ONNX Runtime + VC++ redist beside the OTHER Windows binaries
      # (Phase 51b). The NSIS installer already got them via Dioxus.toml
      # resources during Bundle app; this covers the PORTABLE GUI exe (in the
      # bundle dir the Collect step greps) and the CLI exe (target/release).
      # `setup_ort_dylib()` loads onnxruntime.dll from beside the running exe.
      - name: Place ONNX Runtime beside portable exe + CLI
        shell: bash
        run: |
          set -euo pipefail
          SRC="crates/zord-gui/ort-bundle"
          # Bundle dir holding the portable zord-gui.exe (same dir Collect finds).
          BUNDLE_EXE=$(find target -path "*bundle*" -name "zord-gui.exe" | head -1)
          [ -z "$BUNDLE_EXE" ] && BUNDLE_EXE=$(find target -name "zord-gui.exe" -not -path "*/deps/*" | head -1)
          if [ -n "$BUNDLE_EXE" ]; then
            BUNDLE_DIR=$(dirname "$BUNDLE_EXE")
            cp "$SRC"/*.dll "$BUNDLE_DIR"/
            echo "Copied DLLs beside portable exe: $BUNDLE_DIR"
          else
            echo "::warning::portable zord-gui.exe not found; skipping co-located DLLs"
          fi
          # Beside the CLI exe.
          cp "$SRC"/*.dll target/release/
          ls -l target/release/onnxruntime.dll

      # ---- Optional: Authenticode sign (only if secrets are set) ----
      - name: Sign EXEs with Authenticode
        if: env.HAS_WIN_SIGNING == 'true'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          # Decode the base64-encoded PFX certificate.
          $pfxBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_PFX)
          [IO.File]::WriteAllBytes("cert.pfx", $pfxBytes)

          # Locate signtool.exe via vswhere (present on windows-latest).
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products '*' -requires Microsoft.VisualStudio.Component.Windows10SDK -property installationPath
          $signtool = Get-ChildItem -Recurse -Path "$vsPath\Windows Kits" -Filter "signtool.exe" -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1
          if (-not $signtool) {
            # Fallback: search the common SDK install location.
            $signtool = Get-ChildItem -Recurse -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -ErrorAction SilentlyContinue |
                        Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1
          }
          if (-not $signtool) { throw "signtool.exe not found" }
          $st = $signtool.FullName
          Write-Host "Using signtool: $st"

          $pw = $env:WINDOWS_CERT_PASSWORD
          $tsUrl = "http://timestamp.digicert.com"

          # Sign every EXE produced by the build (bundle GUI, portable GUI, CLI,
          # and the NSIS installer if it exists at this point).
          $targets = @(
            (Get-ChildItem -Recurse target -Path "*bundle*" -Filter "*.exe" -ErrorAction SilentlyContinue),
            (Get-ChildItem -Recurse target -Path "*bundle*" -Filter "*.msi" -ErrorAction SilentlyContinue),
            (Get-Item "target\release\zord.exe" -ErrorAction SilentlyContinue)
          ) | ForEach-Object { $_ } | Where-Object { $_ -ne $null } | Select-Object -ExpandProperty FullName -Unique

          foreach ($exe in $targets) {
            Write-Host "Signing: $exe"
            & $st sign /fd SHA256 /tr $tsUrl /td SHA256 /f cert.pfx /p $pw "$exe"
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $exe" }
          }

          # Clean up the PFX — never leave it in the workspace.
          Remove-Item cert.pfx -Force

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          # Unified naming: Zord-<ver>-<os>-<arch>[-<kind>].<ext> (tag → version,
          # otherwise "dev"). Four Windows artifacts: GUI installer, portable GUI
          # .exe, CLI, and a zip of the two portable EXEs.
          VER="${GITHUB_REF_NAME#v}"; [ "$GITHUB_REF_TYPE" = "tag" ] || VER="dev"
          # Store-channel artifacts carry the channel in the name.
          [ "${{ env.CHANNEL }}" = "github" ] || VER="$VER-${{ env.CHANNEL }}"
          # GUI installer: prefer the NSIS "-setup.exe", else an .msi.
          SETUP=$(find target -maxdepth 8 -path "*bundle*" -name "*setup*.exe" | head -1)
          [ -z "$SETUP" ] && SETUP=$(find target -maxdepth 8 -path "*bundle*" -name "*.msi" | head -1)
          if [ -n "$SETUP" ]; then cp "$SETUP" "dist/Zord-$VER-windows-x64-setup.${SETUP##*.}"; fi
          # Portable GUI .exe (no installer; needs the OS WebView2 runtime).
          GUIEXE=$(find target -path "*bundle*" -name "zord-gui.exe" | head -1)
          [ -z "$GUIEXE" ] && GUIEXE=$(find target -name "zord-gui.exe" -not -path "*/deps/*" | head -1)
          if [ -n "$GUIEXE" ]; then cp "$GUIEXE" "dist/Zord-$VER-windows-x64-gui.exe"; fi
          # CLI binary.
          if [ -f target/release/zord.exe ]; then cp target/release/zord.exe "dist/zord-$VER-windows-x64-cli.exe"; fi
          # ONNX Runtime + VC++ redist (Phase 51b). Stage them in a temp subdir
          # (NOT loose in dist/, which would upload them as stray release assets)
          # for inclusion in the portable zip.
          ORT="crates/zord-gui/ort-bundle"
          mkdir -p dist/_dll
          cp "$ORT"/*.dll dist/_dll/ 2>/dev/null || true
          # Self-update asset (Phase 51c): the updater downloads onnxruntime.dll
          # under this EXACT name and drops it beside the freshly-swapped exe.
          # ASSET-NAME CONTRACT — must match update.rs `WANTED_DLL`. Do not rename
          # without updating the updater (it'd silently stop refreshing the DLL).
          if [ -f "$ORT/onnxruntime.dll" ]; then
            cp "$ORT/onnxruntime.dll" "dist/onnxruntime-windows-x64.dll"
          fi
          # Portable zip: the GUI exe + CLI exe + the DLLs they load at runtime
          # (extract, then run — also sidesteps SmartScreen prompts on a direct
          # .exe download). Installer not included (it carries its own copies).
          ZIP_ITEMS=()
          [ -f "dist/Zord-$VER-windows-x64-gui.exe" ] && ZIP_ITEMS+=("dist/Zord-$VER-windows-x64-gui.exe")
          [ -f "dist/zord-$VER-windows-x64-cli.exe" ] && ZIP_ITEMS+=("dist/zord-$VER-windows-x64-cli.exe")
          for d in onnxruntime.dll vcruntime140.dll vcruntime140_1.dll msvcp140.dll msvcp140_1.dll; do
            [ -f "dist/_dll/$d" ] && ZIP_ITEMS+=("dist/_dll/$d")
          done
          if [ ${#ZIP_ITEMS[@]} -gt 0 ]; then
            PATHS=$(printf "'%s'," "${ZIP_ITEMS[@]}"); PATHS=${PATHS%,}
            powershell -NoProfile -Command "Compress-Archive -Force -Path $PATHS -DestinationPath 'dist/Zord-$VER-windows-x64.zip'"
          fi
          # Drop the temp DLL staging dir so it isn't uploaded as release assets.
          rm -rf dist/_dll
          ls -la dist

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v5
        with:
          name: zord-windows-x64
          path: dist/*

  # One curated notes pass per release (the build jobs only attach files —
  # running generate_release_notes in both used to print the changelog twice).
  # "Highlights" comes from the release commit's body, which is written as a
  # human overview of what was added/fixed rather than a 1:1 commit list.
  notes:
    name: Release notes
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Write curated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          {
            echo "## Highlights"
            echo
            git log -1 --format=%b "$TAG"
            echo
            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
            fi
          } > notes.md
          gh release edit "$TAG" --notes-file notes.md
