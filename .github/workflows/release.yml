name: Release

# Build the macOS + Windows apps (GUI bundle + `zord` CLI) on a version tag,
# optionally sign/notarize macOS, then attach everything to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # Optional engines bundled into the released apps. Kept in one place so both
  # the GUI bundle and the CLI build stay in sync. (encryption is intentionally
  # omitted — its vendored OpenSSL would need Perl + NASM on the Windows runner.)
  FEATURES: "diarization,summaries,parakeet"

jobs:
  macos:
    name: macOS (Apple Silicon)
    # macos-15 ships Xcode 26 (macOS 26 SDK), which the screencapturekit Swift
    # bridge (apple-metal) requires to compile. macos-14 tops out at Xcode 16.
    runs-on: macos-15
    env:
      # macOS 13 deployment target for the ScreenCaptureKit Swift bridge.
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      # True only when signing secrets are configured; gates the sign/notarize steps.
      HAS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_SIGNING_IDENTITY != '' }}
    steps:
      - uses: actions/checkout@v4

      # The screencapturekit Swift bridge (apple-metal/apple-cf) runs `swift
      # build` at compile time; pin a recent stable Xcode so its toolchain
      # matches what builds locally (Swift 6.x) rather than the runner default.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: brew install cmake

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Bundle app
        run: dx bundle --release --package zord-gui --platform desktop --features "${{ env.FEATURES }}"

      - name: Build CLI
        run: cargo build --release --package zord-app --features "${{ env.FEATURES }}"

      # ---- Optional: code-sign + notarize (only if secrets are set) ----
      - name: Import signing certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN"
          rm cert.p12

      - name: Sign, notarize & staple
        if: env.HAS_SIGNING == 'true'
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP=$(find target -path "*bundle*" -name "*.app" -maxdepth 8 -type d | head -1)
          echo "Signing $APP"
          codesign --deep --force --options runtime \
            --entitlements crates/zord-gui/entitlements.plist \
            --sign "$SIGNING_IDENTITY" "$APP"
          # Notarize via a zip, then staple the ticket onto the .app.
          ditto -c -k --keepParent "$APP" Zord.zip
          xcrun notarytool submit Zord.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$APP"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          # Unified naming: Zord-<ver>-<os>-<arch>[-<kind>].<ext> (tag → version,
          # otherwise "dev"). Four macOS artifacts mirroring Windows: installer
          # (.dmg), portable GUI (.app zipped), CLI, and a GUI+CLI zip.
          VER="${GITHUB_REF_NAME#v}"; [ "$GITHUB_REF_TYPE" = "tag" ] || VER="dev"
          # GUI installer (dx-produced .dmg).
          DMG=$(find target -name "*.dmg" -maxdepth 6 | head -1)
          if [ -n "$DMG" ]; then cp "$DMG" "dist/Zord-$VER-macos-arm64.dmg"; fi
          # Portable GUI: the .app, zipped (a bundle can't be a single file).
          APP=$(find target -path "*bundle*" -name "*.app" -maxdepth 8 -type d | head -1)
          if [ -n "$APP" ]; then ditto -c -k --keepParent "$APP" "dist/Zord-$VER-macos-arm64-gui.zip"; fi
          # CLI binary.
          if [ -f target/release/zord ]; then cp target/release/zord "dist/zord-$VER-macos-arm64-cli"; fi
          # Combined portable zip: the GUI .app + the CLI together (mirrors the
          # Windows GUI+CLI zip). Staged under a named folder so it extracts cleanly.
          if [ -n "$APP" ] && [ -f target/release/zord ]; then
            STAGE="Zord-$VER-macos-arm64"
            rm -rf "$STAGE"; mkdir -p "$STAGE"
            cp -R "$APP" "$STAGE/"
            cp target/release/zord "$STAGE/zord"
            ditto -c -k --keepParent "$STAGE" "dist/Zord-$VER-macos-arm64.zip"
            rm -rf "$STAGE"
          fi
          ls -la dist

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: zord-macos-arm64
          path: dist/*

  windows:
    name: Windows (x64)
    runs-on: windows-latest # has MSVC, CMake, and WebView2 preinstalled
    env:
      # Build the cmake C++ deps (llama.cpp, whisper.cpp) against the STATIC MSVC
      # runtime so they match sherpa-onnx's prebuilt /MT libs and Rust's
      # crt-static (set in .cargo/config.toml). Avoids LNK2038/LNK2005.
      CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
      CMAKE_POLICY_DEFAULT_CMP0091: NEW # honor CMAKE_MSVC_RUNTIME_LIBRARY
      # CRITICAL: llama-cpp-sys-2's build.rs calls config.static_crt(false) UNLESS
      # LLAMA_STATIC_CRT=1, which forces ggml/llama onto the DYNAMIC CRT (/MD) and
      # silently overrides CMAKE_MSVC_RUNTIME_LIBRARY above. That makes llama the
      # lone /MD component while Rust/whisper/sherpa are /MT — at inference a buffer
      # freed across the two CRT heaps corrupts the heap and the process vanishes
      # instantly (every Summarize/Compress, no panic, no log). Force it static too.
      LLAMA_STATIC_CRT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dioxus-cli
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Bundle app (WASAPI loopback + cpal mic, CPU whisper)
        run: dx bundle --release --package zord-gui --platform desktop --features "${{ env.FEATURES }}"

      - name: Build CLI
        run: cargo build --release --package zord-app --features "${{ env.FEATURES }}"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          # Unified naming: Zord-<ver>-<os>-<arch>[-<kind>].<ext> (tag → version,
          # otherwise "dev"). Four Windows artifacts: GUI installer, portable GUI
          # .exe, CLI, and a zip of the two portable EXEs.
          VER="${GITHUB_REF_NAME#v}"; [ "$GITHUB_REF_TYPE" = "tag" ] || VER="dev"
          # GUI installer: prefer the NSIS "-setup.exe", else an .msi.
          SETUP=$(find target -maxdepth 8 -path "*bundle*" -name "*setup*.exe" | head -1)
          [ -z "$SETUP" ] && SETUP=$(find target -maxdepth 8 -path "*bundle*" -name "*.msi" | head -1)
          if [ -n "$SETUP" ]; then cp "$SETUP" "dist/Zord-$VER-windows-x64-setup.${SETUP##*.}"; fi
          # Portable GUI .exe (no installer; needs the OS WebView2 runtime).
          GUIEXE=$(find target -path "*bundle*" -name "zord-gui.exe" | head -1)
          [ -z "$GUIEXE" ] && GUIEXE=$(find target -name "zord-gui.exe" -not -path "*/deps/*" | head -1)
          if [ -n "$GUIEXE" ]; then cp "$GUIEXE" "dist/Zord-$VER-windows-x64-gui.exe"; fi
          # CLI binary.
          if [ -f target/release/zord.exe ]; then cp target/release/zord.exe "dist/zord-$VER-windows-x64-cli.exe"; fi
          # Portable zip: the GUI exe + CLI exe (extract, then run — also sidesteps
          # SmartScreen prompts on a direct .exe download). Installer not included.
          EXES=()
          [ -f "dist/Zord-$VER-windows-x64-gui.exe" ] && EXES+=("dist/Zord-$VER-windows-x64-gui.exe")
          [ -f "dist/zord-$VER-windows-x64-cli.exe" ] && EXES+=("dist/zord-$VER-windows-x64-cli.exe")
          if [ ${#EXES[@]} -gt 0 ]; then
            PATHS=$(printf "'%s'," "${EXES[@]}"); PATHS=${PATHS%,}
            powershell -NoProfile -Command "Compress-Archive -Force -Path $PATHS -DestinationPath 'dist/Zord-$VER-windows-x64.zip'"
          fi
          ls -la dist

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Upload artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: zord-windows-x64
          path: dist/*
