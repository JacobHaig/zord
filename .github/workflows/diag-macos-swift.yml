name: Diag macOS Swift bridge

# Temporary diagnostic: find a runner image that ships the macOS 26 SDK
# (Xcode 26), which apple-metal 0.8.7 needs to compile. Delete once macOS CI
# builds green.
on:
  workflow_dispatch: {}

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: Report toolchains on ${{ matrix.os }}
        run: |
          echo "===== runner: ${{ matrix.os }} ($(sw_vers -productVersion)) ====="
          echo "--- installed Xcodes ---"
          ls -1 /Applications | grep -i xcode || true
          echo "--- default xcodebuild ---"; xcodebuild -version
          echo "--- default sdk ---"; xcrun --show-sdk-version
          echo "--- macOS SDKs present ---"
          ls /Applications/Xcode*.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/ 2>/dev/null | sort -u || true
