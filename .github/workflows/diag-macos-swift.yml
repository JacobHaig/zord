name: Diag macOS Swift bridge

# Temporary diagnostic: surface the real `swift build` error from the
# apple-metal/screencapturekit bridge on the runner, plus the available Xcode
# toolchains/SDKs, so we can pin a working one. Delete once CI macOS builds.
on:
  workflow_dispatch:
    inputs:
      xcode:
        description: "Xcode version for setup-xcode (e.g. latest-stable, 16.4, 16.1)"
        default: "latest-stable"
        required: false

jobs:
  diag:
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
    steps:
      - uses: actions/checkout@v4

      - name: Available Xcodes
        run: ls -1 /Applications | grep -i xcode || true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ github.event.inputs.xcode }}

      - name: Toolchain versions
        run: |
          echo "--- xcode-select ---"; xcode-select -p
          echo "--- xcodebuild ---"; xcodebuild -version
          echo "--- swift ---"; swift --version
          echo "--- sdk ---"; xcrun --show-sdk-version; xcrun --show-sdk-path

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build apple-metal (surface the real Swift error)
        run: |
          set +e
          cargo build -p apple-metal -vv 2>&1 | tee am.log
          echo "===== filtered swift output ====="
          grep -iE "swift build|fatalError|error:|triple|warning: unknown|unsupported|residency|available" am.log | tail -120
          exit 0
