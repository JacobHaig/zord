[application]
name = "Zord"

[bundle]
identifier = "io.zord.zord"
publisher = "Zord"
copyright = "Copyright © 2026 Zord"
category = "public.app-category.productivity"
icon = ["icons/icon.icns", "icons/icon.ico", "icons/icon.png"]
# Windows-only: ONNX Runtime (ort load-dynamic, Phase 51) + the VC++ runtime it
# needs. These paths are CWD-relative — dx 0.7.9 resolves `[bundle] resources`
# against the process CWD (the repo root, where the release workflow runs
# `dx bundle --package zord-gui`), NOT the crate dir. So the workflow stages the
# DLLs at repo-root `ort-bundle/` BEFORE `dx bundle` runs — dx builds the NSIS
# installer DURING `dx bundle`, so the files must already exist to be staged into
# the installer beside zord-gui.exe. A config resource with no rename lands next
# to the exe, exactly where `setup_ort_dylib()` looks for `onnxruntime.dll`. On
# macOS / dev builds the dir is absent, so dx logs "Resource not found" (no-op).
resources = [
  "ort-bundle/onnxruntime.dll",
  "ort-bundle/vcruntime140.dll",
  "ort-bundle/vcruntime140_1.dll",
  "ort-bundle/msvcp140.dll",
  "ort-bundle/msvcp140_1.dll",
]

[bundle.macos]
# Matches .cargo/config.toml's deployment target and our Apple-Silicon minimum.
minimum_system_version = "13.0"
# Required for notarization; pairs with entitlements below.
hardened_runtime = true
# Merge custom keys (mic usage string) into the generated Info.plist.
info_plist_path = "Info.plist"
entitlements = "entitlements.plist"
