[package]
name = "zord-gui"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "zord-gui"
path = "src/main.rs"

[features]
default = []
# Enable the NVIDIA Parakeet backend (sherpa-onnx).
parakeet = ["zord-transcribe/parakeet"]
# Enable SQLCipher at-rest encryption (unlock screen + enable/disable in settings).
encryption = ["zord-store/encryption", "zord-config/encryption"]
# Enable local LLM summaries (llama.cpp) + cross-meeting Overview synthesis.
summaries = ["dep:zord-summarize", "zord-summarize/llama", "dep:zord-overview", "zord-overview/llama"]
# Enable per-speaker diarization (sherpa-onnx).
diarization = ["dep:zord-diarize", "zord-diarize/sherpa"]

[dependencies]
zord-core = { workspace = true }
zord-audio = { workspace = true }
zord-capture = { workspace = true }
zord-transcribe = { workspace = true }
zord-store = { workspace = true }
zord-config = { workspace = true }
zord-export = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = "0.2"
dioxus = { version = "0.7", features = ["desktop"] }
tokio = { version = "1", features = ["sync", "rt", "macros", "time"] }
zord-summarize = { workspace = true, optional = true }
zord-overview = { workspace = true, optional = true }
zord-diarize = { workspace = true, optional = true }
arboard = "3"
